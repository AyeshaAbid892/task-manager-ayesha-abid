<svg width="100%" viewBox="0 0 680 140" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>TaskFlow README Footer</title>
  <desc>Footer banner showing project stats, pipeline flow, and attribution</desc>

  <!-- Dark base -->
  <rect width="680" height="140" rx="12" fill="#0D1117"/>

  <!-- Top accent stripe — 3-color Kanban gradient simulation -->
  <rect x="0"   y="0" width="227" height="3" rx="0" fill="#6E40C9"/>
  <rect x="227" y="0" width="226" height="3" fill="#0C66E4"/>
  <rect x="453" y="0" width="227" height="3" rx="0" fill="#238636"/>
  <!-- rounded ends -->
  <rect x="0"   y="0" width="6"  height="3" rx="2" fill="#6E40C9"/>
  <rect x="674" y="0" width="6"  height="3" rx="2" fill="#238636"/>

  <!-- Subtle dot grid -->
  <g fill="#21262D">
    <rect x="30" y="25"  width="2" height="2" rx="1"/>
    <rect x="30" y="55"  width="2" height="2" rx="1"/>
    <rect x="30" y="85"  width="2" height="2" rx="1"/>
    <rect x="30" y="115" width="2" height="2" rx="1"/>
    <rect x="650" y="25"  width="2" height="2" rx="1"/>
    <rect x="650" y="55"  width="2" height="2" rx="1"/>
    <rect x="650" y="85"  width="2" height="2" rx="1"/>
    <rect x="650" y="115" width="2" height="2" rx="1"/>
  </g>

  <!-- Pipeline flow bar (Todo → InProgress → Done) -->
  <rect x="60" y="20" width="80" height="26" rx="5" fill="#161B22" stroke="#30363D" stroke-width="0.5"/>
  <text x="100" y="30" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="8" font-weight="600" fill="#6E7681" letter-spacing="0.4">TO DO</text>
  <text x="100" y="41" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" fill="#E6EDF3">2 issues</text>

  <!-- arrow -->
  <path d="M148 33 L172 33" stroke="#30363D" stroke-width="1" fill="none"/>
  <polygon points="172,30 178,33 172,36" fill="#30363D"/>

  <rect x="182" y="20" width="116" height="26" rx="5" fill="#0C66E4" opacity="0.12" stroke="#0C66E4" stroke-width="0.5"/>
  <text x="240" y="30" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="8" font-weight="600" fill="#4C9AFF" letter-spacing="0.4">IN PROGRESS</text>
  <text x="240" y="41" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" fill="#E6EDF3">2 issues</text>

  <!-- arrow -->
  <path d="M306 33 L330 33" stroke="#30363D" stroke-width="1" fill="none"/>
  <polygon points="330,30 336,33 330,36" fill="#30363D"/>

  <rect x="340" y="20" width="80" height="26" rx="5" fill="#238636" opacity="0.12" stroke="#238636" stroke-width="0.5"/>
  <text x="380" y="30" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="8" font-weight="600" fill="#3FB950" letter-spacing="0.4">DONE</text>
  <text x="380" y="41" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" fill="#E6EDF3">2 issues</text>

  <!-- Divider -->
  <line x1="36" y1="58" x2="644" y2="58" stroke="#21262D" stroke-width="0.5"/>

  <!-- Stats row -->
  <g>
    <!-- Stat 1 -->
    <text x="72"  y="78" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="800" fill="#4C9AFF">11</text>
    <text x="72"  y="93" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="9"  font-weight="400" fill="#6E7681">files</text>

    <!-- vertical sep -->
    <line x1="112" y1="68" x2="112" y2="96" stroke="#21262D" stroke-width="0.5"/>

    <!-- Stat 2 -->
    <text x="152" y="78" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="800" fill="#E3B341">3.2k</text>
    <text x="152" y="93" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="9"  font-weight="400" fill="#6E7681">lines of code</text>

    <line x1="200" y1="68" x2="200" y2="96" stroke="#21262D" stroke-width="0.5"/>

    <!-- Stat 3 -->
    <text x="236" y="78" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="800" fill="#3FB950">22</text>
    <text x="236" y="93" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="9"  font-weight="400" fill="#6E7681">features</text>

    <line x1="276" y1="68" x2="276" y2="96" stroke="#21262D" stroke-width="0.5"/>

    <!-- Stat 4 -->
    <text x="312" y="78" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="800" fill="#FF7452">5/5</text>
    <text x="312" y="93" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="9"  font-weight="400" fill="#6E7681">bonus done</text>

    <line x1="358" y1="68" x2="358" y2="96" stroke="#21262D" stroke-width="0.5"/>

    <!-- Stat 5 — highlighted -->
    <rect x="368" y="64" width="88" height="36" rx="6" fill="#0C66E4" opacity="0.12"/>
    <text x="412" y="78" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="800" fill="#4C9AFF">100</text>
    <text x="412" y="93" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="9"  font-weight="600" fill="#4C9AFF">target marks</text>

    <line x1="464" y1="68" x2="464" y2="96" stroke="#21262D" stroke-width="0.5"/>

    <!-- Stat 6 -->
    <text x="502" y="78" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="800" fill="#BC8CFF">7</text>
    <text x="502" y="93" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="9"  font-weight="400" fill="#6E7681">JS modules</text>

    <line x1="548" y1="68" x2="548" y2="96" stroke="#21262D" stroke-width="0.5"/>

    <!-- Stat 7 -->
    <text x="596" y="78" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="800" fill="#F78166">0</text>
    <text x="596" y="93" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="9"  font-weight="400" fill="#6E7681">dependencies</text>
  </g>

  <!-- Bottom divider -->
  <line x1="36" y1="108" x2="644" y2="108" stroke="#21262D" stroke-width="0.5"/>

  <!-- Footer attribution -->
  <text x="36"  y="126" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" font-weight="400" fill="#6E7681">Built with ♥  using HTML · CSS · Vanilla JS · No frameworks · No dependencies</text>
  <text x="644" y="126" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" font-weight="500" fill="#4C9AFF">MERN Bootcamp · 2025</text>
</svg>
